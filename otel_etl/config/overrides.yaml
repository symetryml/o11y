# User overrides for OTel ETL pipeline
# This file is checked into version control

# Force specific labels to be kept regardless of cardinality
force_keep_labels:
  # - customer_tier
  # - deployment_environment

# Force specific labels to be dropped regardless of cardinality
force_drop_labels:
  - otel_scope_name
  - otel_scope_version
  - telemetry_sdk_name
  - telemetry_sdk_language
  - telemetry_sdk_version

# Custom VIP values for specific labels (bypass top-N filtering)
vip_values:
  http_route:
    - /health
    - /ready
    - /metrics
    - /api/v1/products
    - /api/v1/cart

# Custom bucket mappings for non-standard labels
custom_buckets:
  # my_custom_status_label:
  #   "0": success
  #   "1": warning
  #   "2": error

# Override tier classification for specific labels
tier_overrides:
  # some_label_that_should_be_tier_1:
  #   tier: 1
  #   action: keep
